<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f6f8;
            color: #222;
        }

        .calculator {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border: 1px solid #d8dee4;
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #d8dee4;
            text-align: left;
        }

        th {
            background: #eef2f6;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 6px;
            background: #1f6feb;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #185abc;
        }
    </style>
</head>
<body>
    <main class="calculator">
        <h1>Simple Calculator</h1>

        <form action="calculate" method="post">
            <table>
                <thead>
                    <tr>
                        <th>First Number</th>
                        <th>Second Number</th>
                        <th>Answer</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <input type="number" name="number1" step="any" required>
                        </td>
                        <td>
                            <input type="number" name="number2" step="any" required>
                        </td>
                        <td>
                            <input type="text" value="Submit to calculate" readonly>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="3">
                            <select name="operation" required>
                                <option value="add">Addition (+)</option>
                                <option value="subtract">Subtraction (-)</option>
                                <option value="multiply">Multiplication (*)</option>
                                <option value="divide">Division (/)</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="3">
                            <button type="submit">Calculate</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </main>
</body>
</html>
